<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>출근 경로 안내</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출근경로">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --border: rgba(0,0,0,0.1);
    --text: #1a1a1a; --muted: #6b6b68; --hint: #9a9a96;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --green: #3B6D11; --green-bg: #EAF3DE;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --red-bg: #FCEBEB; --red-text: #A32D2D; --gray-bg: #F1EFE8;
    --radius: 12px; --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top); --safe-bot: env(safe-area-inset-bottom);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding-bottom: calc(2rem + var(--safe-bot));
    -webkit-tap-highlight-color: transparent;
  }
  .app { max-width: 420px; margin: 0 auto; }
  .header {
    background: var(--surface); padding: calc(1.25rem + var(--safe-top)) 1.25rem 1rem;
    border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10;
  }
  .header-title { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .form-card {
    background: var(--surface); margin: 12px 12px 0;
    border-radius: var(--radius); padding: 1.25rem; border: 0.5px solid var(--border);
  }
  .field + .field { margin-top: 12px; }
  .field-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .input-wrap { position: relative; }
  .input-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 17px; color: var(--hint); pointer-events: none; }
  .input-wrap input {
    width: 100%; height: 44px; border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 0 12px 0 36px;
    font-size: 16px; color: var(--text); background: var(--bg);
    outline: none; -webkit-appearance: none;
  }
  .input-wrap input:focus { border-color: var(--blue); background: var(--surface); }
  .time-row { display: flex; gap: 10px; align-items: flex-end; }
  .time-row .field { flex: 1; }
  .time-input {
    width: 100%; height: 44px; border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 0 12px;
    font-size: 16px; color: var(--text); background: var(--bg);
    outline: none; -webkit-appearance: none;
  }
  .buffer-select {
    height: 44px; border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 0 10px; font-size: 14px; color: var(--text); background: var(--bg);
    outline: none; width: 100px; -webkit-appearance: none;
  }
  .calc-btn {
    width: 100%; height: 52px; margin-top: 16px; background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius-sm); font-size: 16px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: opacity 0.15s;
  }
  .calc-btn:active { opacity: 0.8; }
  .calc-btn:disabled { opacity: 0.5; }
  .depart-card {
    margin: 12px 12px 0; background: var(--amber-bg); border-radius: var(--radius);
    padding: 1.1rem 1.25rem; border: 0.5px solid #FAC775;
    display: flex; align-items: center; gap: 16px;
  }
  .depart-time { font-size: 36px; font-weight: 700; letter-spacing: -1px; }
  .depart-label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .depart-countdown { font-size: 13px; font-weight: 600; color: var(--amber-text); margin-top: 3px; }
  .summary-row { display: flex; gap: 8px; margin: 10px 12px 0; }
  .sum-pill { flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .sum-val { font-size: 17px; font-weight: 600; }
  .sum-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .timeline-card { margin: 10px 12px 0; background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .tl-header { padding: 12px 16px; border-bottom: 0.5px solid var(--border); font-size: 13px; font-weight: 600; color: var(--muted); }
  .tl-item { display: flex; padding: 0 16px; }
  .tl-left { display: flex; flex-direction: column; align-items: center; width: 44px; flex-shrink: 0; }
  .tl-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; margin-top: 16px; z-index: 1; border: 2.5px solid var(--surface); box-shadow: 0 0 0 2px currentColor; }
  .tl-dot.walk   { color: #888; background: #888; }
  .tl-dot.bus    { color: var(--blue); background: var(--blue); }
  .tl-dot.subway { color: var(--green); background: var(--green); }
  .tl-dot.arrive { color: #D85A30; background: #D85A30; }
  .tl-line { flex: 1; width: 2px; margin: 2px 0; }
  .tl-line.walk   { background: repeating-linear-gradient(to bottom,#bbb 0,#bbb 4px,transparent 4px,transparent 8px); }
  .tl-line.bus    { background: var(--blue); }
  .tl-line.subway { background: var(--green); }
  .tl-line.none   { background: transparent; }
  .tl-body { flex: 1; padding: 12px 0 12px 14px; border-bottom: 0.5px solid var(--border); }
  .tl-item:last-child .tl-body { border-bottom: none; }
  .tl-time { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .tl-name { font-size: 15px; margin-top: 2px; font-weight: 500; }
  .tl-detail { font-size: 13px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; margin-top: 6px; }
  .badge.subway { background: var(--green-bg); color: var(--green); }
  .badge.bus    { background: var(--blue-bg); color: var(--blue-text); }
  .badge.walk   { background: var(--gray-bg); color: #5F5E5A; }
  .realtime-box { margin-top: 8px; background: var(--bg); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; }
  .realtime-title { color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .realtime-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
  .realtime-item:last-child { border-bottom: none; }
  .realtime-msg { color: var(--blue-text); font-weight: 600; }
  .hidden { display: none !important; }
  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; }
  .error-msg { margin: 12px; padding: 14px 16px; background: var(--red-bg); border-radius: var(--radius); color: var(--red-text); font-size: 14px; border: 0.5px solid #F7C1C1; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title"><i class="ti ti-train" style="font-size:20px;"></i> 출근 경로 안내</div>
    <div class="header-sub">목표 도착 시각 → 최적 출발 시각 역산</div>
  </div>

  <div class="form-card">
    <div class="field">
      <div class="field-label">출발지</div>
      <div class="input-wrap">
        <i class="ti ti-map-pin"></i>
        <input type="text" id="from" placeholder="예: 김포공항역" value="김포공항역" autocomplete="off">
      </div>
    </div>
    <div class="field">
      <div class="field-label">도착지</div>
      <div class="input-wrap">
        <i class="ti ti-building-office"></i>
        <input type="text" id="to" placeholder="예: 가산디지털단지역" value="가산디지털단지역" autocomplete="off">
      </div>
    </div>
    <div class="field">
      <div class="field-label">도착해야 하는 시각</div>
      <div class="time-row">
        <div class="field">
          <input type="time" id="arrive-time" class="time-input" value="09:50">
        </div>
        <div>
          <div class="field-label">여유 시간</div>
          <select id="buffer" class="buffer-select">
            <option value="5">5분</option>
            <option value="10" selected>10분</option>
            <option value="15">15분</option>
            <option value="20">20분</option>
          </select>
        </div>
      </div>
    </div>
    <button class="calc-btn" id="calc-btn" onclick="fetchRoute()">
      <i class="ti ti-route"></i> 출발 시각 계산하기
    </button>
  </div>

  <div id="loading" class="loading hidden">
    <i class="ti ti-loader-2" style="font-size:28px; animation: spin 1s linear infinite;"></i>
    <div style="margin-top:8px;">경로 계산 중...</div>
  </div>
  <div id="error" class="error-msg hidden"></div>

  <div id="result" class="hidden">
    <div class="depart-card" id="depart-card">
      <div>
        <div class="depart-label">지금 출발하세요</div>
        <div class="depart-time" id="depart-time">--:--</div>
        <div class="depart-countdown" id="countdown"></div>
      </div>
      <div style="margin-left:auto; text-align:right;">
        <div style="font-size:12px; color:var(--muted);">총 소요</div>
        <div style="font-size:22px; font-weight:700;" id="total-min">--분</div>
        <div style="font-size:12px; color:var(--muted);" id="buffer-label"></div>
      </div>
    </div>
    <div class="summary-row">
      <div class="sum-pill"><div class="sum-val" id="s-transfer">-</div><div class="sum-lbl">환승</div></div>
      <div class="sum-pill"><div class="sum-val" id="s-walk">-</div><div class="sum-lbl">도보</div></div>
      <div class="sum-pill"><div class="sum-val" id="s-cost">-</div><div class="sum-lbl">요금</div></div>
    </div>
    <div class="timeline-card">
      <div class="tl-header">경로 타임라인</div>
      <div id="timeline"></div>
    </div>
  </div>
</div>

<script>
const ODSAY_KEY = "mTXJ4RrO4uXr6CAYlN+S3A";
const API_BASE  = "";

const LINE_COLORS = {
  "1":"#0052A4","2":"#00A84D","3":"#EF7C1C","4":"#00A5DE",
  "5":"#996CAC","6":"#CD7C2F","7":"#747F00","8":"#E6186C","9":"#BDB092"
};

if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");

function toMinutes(t) { const [h,m]=t.split(":").map(Number); return h*60+m; }
function nowMinutes() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function toTimeStr(m) { return `${String(Math.floor(m/60)%24).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`; }

async function searchStation(name) {
  const url = `https://api.odsay.com/v1/api/searchStation?apiKey=${encodeURIComponent(ODSAY_KEY)}&stationName=${encodeURIComponent(name)}&stationClass=2&lang=0`;
  const data = await fetch(url).then(r => r.json());
  if (data.error) throw new Error(`역 검색 실패: ${name}`);
  const s = data.result.station[0];
  return { x: s.x, y: s.y, name: s.stationName };
}

async function getRoute(sx, sy, ex, ey) {
  const url = `https://api.odsay.com/v1/api/searchPubTransPathT?apiKey=${encodeURIComponent(ODSAY_KEY)}&SX=${sx}&SY=${sy}&EX=${ex}&EY=${ey}&SearchType=0&lang=0`;
  const data = await fetch(url).then(r => r.json());
  if (data.error) throw new Error("경로 탐색 실패");
  return data.result.path.sort((a,b) => a.info.totalTime - b.info.totalTime)[0];
}

async function getSubwayRealtime(station) {
  try {
    const data = await fetch(`${API_BASE}/api/subway/realtime?station=${encodeURIComponent(station)}`).then(r=>r.json());
    return data.arrivals || [];
  } catch { return []; }
}

function buildTimeline(path, arriveTimeStr, bufferMin) {
  const info = path.info;
  const totalMin = info.totalTime;
  const arriveM  = toMinutes(arriveTimeStr);
  const departM  = arriveM - totalMin - bufferMin;
  let   currentM = departM;
  const steps    = [];

  for (const sp of path.subPath) {
    const t        = sp.trafficType;
    const duration = sp.sectionTime || 0;
    if (t === 4) {
      if (!duration) continue;
      steps.push({ type:"walk", time:toTimeStr(currentM), label:"도보 이동",
        detail:`${sp.startName||"출발"} → ${sp.endName||"도착"}`, duration, badge:`도보 ${duration}분` });
    } else if (t === 1) {
      const lane = sp.lane[0];
      const lineName = lane.name || "지하철";
      steps.push({ type:"subway", time:toTimeStr(currentM), label:`${lineName} 탑승`,
        detail:`${sp.startName} → ${sp.endName} (${sp.stationCount}정거장)`,
        duration, badge:lineName, color:LINE_COLORS[String(lane.subwayCode||"")]||"#888",
        realtimeStation: sp.startName });
    } else if (t === 2 || t === 3) {
      const busNo = sp.lane[0].busNo || "버스";
      steps.push({ type:"bus", time:toTimeStr(currentM), label:`${busNo}번 버스 탑승`,
        detail:`${sp.startName} → ${sp.endName} (${sp.stationCount}정거장)`,
        duration, badge:`${busNo}번` });
    }
    currentM += duration;
  }
  steps.push({ type:"arrive", time:toTimeStr(arriveM), label:"도착", detail:"목적지 도착" });
  return {
    departTime: toTimeStr(departM), arriveTime: arriveTimeStr,
    totalMin: totalMin + bufferMin, routeMin: totalMin, bufferMin,
    transferCount: info.transitCount,
    walkMin: Math.floor((info.totalWalk||0) / 60),
    cost: info.payment || 0, steps
  };
}

async function fetchRoute() {
  const from       = document.getElementById("from").value.trim();
  const to         = document.getElementById("to").value.trim();
  const arriveTime = document.getElementById("arrive-time").value;
  const buffer     = parseInt(document.getElementById("buffer").value);
  if (!from || !to || !arriveTime) return;

  document.getElementById("calc-btn").disabled = true;
  document.getElementById("result").classList.add("hidden");
  document.getElementById("error").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  try {
    const [origin, dest] = await Promise.all([searchStation(from), searchStation(to)]);
    const path   = await getRoute(origin.x, origin.y, dest.x, dest.y);
    const result = buildTimeline(path, arriveTime, buffer);

    for (const step of result.steps) {
      if (step.type === "subway" && step.realtimeStation) {
        const arrivals = await getSubwayRealtime(step.realtimeStation);
        if (arrivals.length) step.realtimeArrivals = arrivals.slice(0,3);
      }
    }
    renderResult(result);
    document.getElementById("result").classList.remove("hidden");
  } catch(e) {
    const el = document.getElementById("error");
    el.textContent = `⚠️ ${e.message}`;
    el.classList.remove("hidden");
  } finally {
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("calc-btn").disabled = false;
  }
}

function renderResult(data) {
  document.getElementById("depart-time").textContent  = data.departTime;
  document.getElementById("total-min").textContent    = `${data.totalMin}분`;
  document.getElementById("buffer-label").textContent = `여유 ${data.bufferMin}분 포함`;
  document.getElementById("s-transfer").textContent   = `${data.transferCount}회`;
  document.getElementById("s-walk").textContent       = `${data.walkMin}분`;
  document.getElementById("s-cost").textContent       = data.cost ? `${data.cost.toLocaleString()}원` : "-";

  const diff = toMinutes(data.departTime) - nowMinutes();
  document.getElementById("countdown").textContent = diff < 0 ? `⚠️ ${Math.abs(diff)}분 지연` : diff === 0 ? "🚨 지금 출발!" : `⏱ ${diff}분 후 출발`;
  document.getElementById("depart-card").style.background = diff <= 0 ? "#FCEBEB" : "var(--amber-bg)";

  const tl = document.getElementById("timeline");
  tl.innerHTML = "";
  data.steps.forEach((step, i) => {
    const isLast  = i === data.steps.length - 1;
    const lineH   = step.duration ? Math.max(28, step.duration * 2.5) : 28;
    const badge   = step.badge ? `<span class="badge ${step.type}">${step.badge}</span>` : "";
    let rtHTML = "";
    if (step.realtimeArrivals?.length) {
      const rows = step.realtimeArrivals.map(a =>
        `<div class="realtime-item"><span>${a.direction||a.destination||""}</span><span class="realtime-msg">${a.arrivalMsg}</span></div>`
      ).join("");
      rtHTML = `<div class="realtime-box"><div class="realtime-title">실시간 도착</div>${rows}</div>`;
    }
    const item = document.createElement("div");
    item.className = "tl-item";
    item.innerHTML = `
      <div class="tl-left">
        <div class="tl-dot ${step.type}"></div>
        ${!isLast ? `<div class="tl-line ${step.type === "walk" ? "walk" : step.type}" style="min-height:${lineH}px;"></div>` : ""}
      </div>
      <div class="tl-body">
        <div class="tl-time">${step.time}</div>
        <div class="tl-name">${step.label}</div>
        <div class="tl-detail">${step.detail}</div>
        ${badge}${rtHTML}
      </div>`;
    tl.appendChild(item);
  });
}

window.addEventListener("load", fetchRoute);
</script>
</body>
</html>
