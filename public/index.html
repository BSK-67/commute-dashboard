<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="출근경로">
<link rel="manifest" href="/manifest.json">
<title>출근 경로</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #111; padding-bottom: 32px; }
  .header { background: #1a73e8; color: white; padding: 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .now-time { font-size: 15px; font-weight: 500; }
  .refresh-btn { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 8px; padding: 6px 12px; font-size: 15px; cursor: pointer; }
  .content { padding: 14px; max-width: 480px; margin: 0 auto; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .metric { background: white; border-radius: 12px; padding: 14px; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-val { font-size: 24px; font-weight: 700; color: #111; }
  .metric-sub { font-size: 11px; margin-top: 3px; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
  .badge-ok { background: #e6f4ea; color: #137333; }
  .badge-warn { background: #fff3e0; color: #e65100; }
  .badge-danger { background: #fce8e6; color: #c5221f; }
  .section-title { font-size: 12px; font-weight: 600; color: #888; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .route-card { background: white; border: 2px solid transparent; border-radius: 14px; padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .route-card.selected { border-color: #1a73e8; }
  .route-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .route-label { font-size: 14px; font-weight: 600; }
  .rec-badge { font-size: 10px; background: #e8f0fe; color: #1a73e8; padding: 2px 7px; border-radius: 5px; font-weight: 600; margin-left: 6px; }
  .route-meta { font-size: 12px; color: #888; }
  .steps { display: flex; flex-wrap: wrap; gap: 5px; }
  .step { font-size: 12px; padding: 4px 9px; border-radius: 7px; }
  .step-bus { background: #e8f0fe; color: #1a56db; }
  .step-subway { background: #e6f4ea; color: #137333; }
  .step-walk { background: #f1f3f4; color: #555; }
  .timeline-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 8px; }
  .tl { display: flex; gap: 12px; padding-bottom: 14px; position: relative; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .tl-dot-bus { background: #1a73e8; }
  .tl-dot-subway { background: #137333; }
  .tl-dot-walk { background: #bbb; }
  .tl-dot-dest { background: #d93025; }
  .tl-line { position: absolute; left: 4px; top: 14px; bottom: 0; width: 2px; background: #f0f0f0; }
  .tl:last-child .tl-line { display: none; }
  .tl-body { flex: 1; }
  .tl-main { font-size: 13px; font-weight: 600; }
  .tl-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .tl-time { font-size: 13px; font-weight: 600; color: #1a73e8; white-space: nowrap; }
  .bus-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 8px; }
  .bus-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
  .bus-row:last-child { border-bottom: none; }
  .bus-name { font-size: 13px; font-weight: 500; }
  .bus-arr { font-size: 14px; font-weight: 700; }
  .arr-soon { color: #d93025; }
  .arr-ok { color: #137333; }
  .loading { text-align: center; padding: 60px 0; color: #888; font-size: 15px; }
  .error { background: #fce8e6; border-radius: 12px; padding: 16px; color: #c5221f; font-size: 13px; margin-top: 10px; line-height: 1.6; }
</style>
</head>
<body>
<div class="header">
  <h1>🚌 출근 경로</h1>
  <div class="header-right">
    <span class="now-time" id="now-time">--:--</span>
    <button class="refresh-btn" onclick="load()">⟳</button>
  </div>
</div>
<div class="content">
  <div id="app"><div class="loading">경로 조회 중...</div></div>
</div>

<script>
// 자체 Vercel Edge Function 호출
async function getRoutes() {
  const res = await fetch("/api/route?type=route");
  const data = await res.json();
  if (!data.result) throw new Error("경로 조회 실패: " + JSON.stringify(data));
  return (data.result.path || []).slice(0, 3);
}

async function getBusArrival(stId, busRouteId) {
  try {
    const res = await fetch(`/api/route?type=bus&stId=${stId}&busRouteId=${busRouteId}`);
    const data = await res.json();
    const item = data?.msgBody?.itemList;
    const arr = Array.isArray(item) ? item[0] : item;
    return arr?.arrmsg1 || "";
  } catch { return ""; }
}

async function getSubwayArrival(stationName) {
  try {
    const res = await fetch(`/api/route?type=subway&station=${encodeURIComponent(stationName)}`);
    const data = await res.json();
    return data?.realtimeArrivalList?.[0]?.arvlMsg2 || "";
  } catch { return ""; }
}

function parseMin(msg) {
  if (!msg) return 5;
  if (msg.includes("곧 도착") || msg.includes("0분")) return 0;
  const m = msg.match(/(\d+)분/);
  return m ? parseInt(m[1]) : 5;
}

function addMin(timeStr, min) {
  const [h, m] = timeStr.split(":").map(Number);
  const total = h * 60 + m + min;
  return `${String(Math.floor(total/60)).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
}

function nowHHMM() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}

function recommendDepart(totalMin) {
  const dep = 10 * 60 - totalMin - 5;
  return `${String(Math.floor(dep/60)).padStart(2,"0")}:${String(dep%60).padStart(2,"0")}`;
}

function calcMargin(arriveStr) {
  const [ah, am] = arriveStr.split(":").map(Number);
  return 10 * 60 - (ah * 60 + am);
}

async function simulate(path) {
  const subPaths = path.subPath || [];
  let cursor = nowHHMM();
  const timeline = [];
  for (const sp of subPaths) {
    const t = sp.trafficType;
    if (t === 3) {
      const end = addMin(cursor, sp.sectionTime || 0);
      timeline.push({ type:"walk", label:`도보 ${sp.sectionTime}분`, depart: cursor, arrive: end, waitMin: 0 });
      cursor = end;
    } else if (t === 2) {
      const busNo = sp.lane?.[0]?.busNo || "버스";
      const msg   = await getBusArrival(sp.startID || "", sp.lane?.[0]?.busID || "");
      const wait  = parseMin(msg);
      const board = addMin(cursor, wait);
      const end   = addMin(board, sp.sectionTime || 0);
      timeline.push({ type:"bus", label:`${busNo}번 버스`, station: sp.startName||"", endStation: sp.endName||"", waitMin: wait, depart: board, arrive: end });
      cursor = end;
    } else if (t === 1) {
      const lineName = sp.lane?.[0]?.name || "지하철";
      const msg  = await getSubwayArrival(sp.startName || "");
      const wait = parseMin(msg);
      const board = addMin(cursor, wait);
      const end   = addMin(board, sp.sectionTime || 0);
      timeline.push({ type:"subway", label: lineName, station: sp.startName||"", endStation: sp.endName||"", waitMin: wait, depart: board, arrive: end });
      cursor = end;
    }
  }
  const margin = calcMargin(cursor);
  return { timeline, arriveTime: cursor, marginMin: margin, onTime: margin >= 0 };
}

let allRoutes = [], selectedId = "A";

function stepHtml(sp) {
  const t = sp.trafficType;
  if (t === 2) return `<span class="step step-bus">🚌 ${sp.lane?.[0]?.busNo||"버스"}번</span>`;
  if (t === 1) return `<span class="step step-subway">🚇 ${sp.lane?.[0]?.name||"지하철"}</span>`;
  if (t === 3) return `<span class="step step-walk">🚶 ${sp.sectionTime}분</span>`;
  return "";
}

function badgeHtml(margin, onTime) {
  if (!onTime) return `<span class="badge badge-danger">⚠ ${Math.abs(margin)}분 지연</span>`;
  if (margin < 10) return `<span class="badge badge-warn">여유 ${margin}분</span>`;
  return `<span class="badge badge-ok">여유 ${margin}분</span>`;
}

function render() {
  const sel = allRoutes.find(r => r.id === selectedId) || allRoutes[0];
  if (!sel) return;

  const routeCards = allRoutes.map(r => `
    <div class="route-card ${r.id === selectedId ? "selected" : ""}" onclick="select('${r.id}')">
      <div class="route-header">
        <span class="route-label">경로 ${r.id}${r.recommended ? '<span class="rec-badge">추천</span>' : ""}</span>
        <span class="route-meta">${r.path.info.totalTime}분 · 환승 ${r.path.info.trafficCount}회</span>
      </div>
      <div class="steps">${(r.path.subPath||[]).map(stepHtml).join("")}</div>
    </div>`).join("");

  const busRows = sel.sim.timeline.filter(t => t.type === "bus").map(b => `
    <div class="bus-row">
      <span class="bus-name">${b.label} (${b.station})</span>
      <span class="bus-arr ${b.waitMin <= 3 ? "arr-soon" : "arr-ok"}">${b.waitMin === 0 ? "곧 도착" : b.waitMin + "분 후"}</span>
    </div>`).join("") || `<div class="bus-row"><span class="bus-name" style="color:#888">정보 없음</span></div>`;

  const tlHtml = sel.sim.timeline.map((t, i) => {
    const last = i === sel.sim.timeline.length - 1;
    const dot = last ? "tl-dot-dest" : `tl-dot-${t.type}`;
    const sub = t.type !== "walk" ? `${t.station} → ${t.endStation}${t.waitMin > 0 ? ` · ${t.waitMin}분 대기` : ""}` : "";
    return `<div class="tl">
      <div class="tl-dot ${dot}"></div><div class="tl-line"></div>
      <div class="tl-body"><div class="tl-main">${t.label}</div>${sub ? `<div class="tl-sub">${sub}</div>` : ""}</div>
      <div class="tl-time">${t.depart}</div></div>`;
  }).join("") + `<div class="tl">
    <div class="tl-dot tl-dot-dest"></div>
    <div class="tl-body"><div class="tl-main">퍼블릭가산 A동 도착</div></div>
    <div class="tl-time">${sel.sim.arriveTime}</div></div>`;

  document.getElementById("app").innerHTML = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">권장 출발</div>
        <div class="metric-val">${recommendDepart(sel.path.info.totalTime)}</div>
        <div class="metric-sub" style="color:#888">10시 도착 기준</div>
      </div>
      <div class="metric">
        <div class="metric-label">도착 예상</div>
        <div class="metric-val">${sel.sim.arriveTime}</div>
        <div class="metric-sub">${badgeHtml(sel.sim.marginMin, sel.sim.onTime)}</div>
      </div>
    </div>
    <div class="section-title">경로 선택</div>
    ${routeCards}
    <div class="section-title">실시간 버스 도착</div>
    <div class="bus-card">${busRows}</div>
    <div class="section-title">상세 경로</div>
    <div class="timeline-card">${tlHtml}</div>`;
}

function select(id) { selectedId = id; render(); }

async function load() {
  document.getElementById("app").innerHTML = '<div class="loading">실시간 조회 중...</div>';
  try {
    const paths = await getRoutes();
    if (!paths.length) throw new Error("경로를 찾을 수 없습니다.");
    allRoutes = await Promise.all(paths.map(async (p, i) => {
      const sim = await simulate(p);
      return { id: String.fromCharCode(65+i), path: p, sim, recommended: false };
    }));
    const best = allRoutes.filter(r => r.sim.onTime).sort((a,b) => b.sim.marginMin - a.sim.marginMin)[0] || allRoutes[0];
    best.recommended = true;
    selectedId = best.id;
    render();
  } catch(e) {
    document.getElementById("app").innerHTML = `<div class="error">⚠ 오류: ${e.message}<br><small>잠시 후 다시 시도해주세요.</small></div>`;
  }
}

function updateClock() {
  document.getElementById("now-time").textContent = nowHHMM();
}
updateClock();
setInterval(updateClock, 10000);
load();
setInterval(load, 60000);

if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
</html>
