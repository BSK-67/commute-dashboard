<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="출근경로">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>출근 경로</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #111; padding-bottom: 32px; }

  .header { background: #1a73e8; color: white; padding: 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .now-time { font-size: 15px; font-weight: 500; }
  .refresh-btn { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 8px; padding: 6px 10px; font-size: 13px; cursor: pointer; }

  .content { padding: 14px; max-width: 480px; margin: 0 auto; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .metric { background: white; border-radius: 12px; padding: 14px; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .metric-val { font-size: 24px; font-weight: 700; color: #111; }
  .metric-sub { font-size: 11px; margin-top: 3px; }

  .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
  .badge-ok { background: #e6f4ea; color: #137333; }
  .badge-warn { background: #fff3e0; color: #e65100; }
  .badge-danger { background: #fce8e6; color: #c5221f; }

  .section-title { font-size: 12px; font-weight: 600; color: #888; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .route-card { background: white; border: 2px solid transparent; border-radius: 14px; padding: 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
  .route-card.selected { border-color: #1a73e8; }
  .route-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .route-label { font-size: 14px; font-weight: 600; }
  .rec-badge { font-size: 10px; background: #e8f0fe; color: #1a73e8; padding: 2px 7px; border-radius: 5px; font-weight: 600; margin-left: 6px; }
  .route-meta { font-size: 12px; color: #888; }
  .steps { display: flex; flex-wrap: wrap; gap: 5px; }
  .step { font-size: 12px; padding: 4px 9px; border-radius: 7px; }
  .step-bus { background: #e8f0fe; color: #1a56db; }
  .step-subway { background: #e6f4ea; color: #137333; }
  .step-walk { background: #f1f3f4; color: #555; }

  .timeline-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 8px; }
  .tl { display: flex; gap: 12px; padding-bottom: 14px; position: relative; }
  .tl-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .tl-dot-bus { background: #1a73e8; }
  .tl-dot-subway { background: #137333; }
  .tl-dot-walk { background: #bbb; }
  .tl-dot-dest { background: #d93025; }
  .tl-line { position: absolute; left: 4px; top: 14px; bottom: 0; width: 2px; background: #f0f0f0; }
  .tl:last-child .tl-line { display: none; }
  .tl-body { flex: 1; }
  .tl-main { font-size: 13px; font-weight: 600; }
  .tl-sub { font-size: 12px; color: #888; margin-top: 2px; }
  .tl-time { font-size: 13px; font-weight: 600; color: #1a73e8; white-space: nowrap; }

  .bus-card { background: white; border-radius: 14px; padding: 14px; margin-bottom: 8px; }
  .bus-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
  .bus-row:last-child { border-bottom: none; }
  .bus-name { font-size: 13px; font-weight: 500; }
  .bus-arr { font-size: 14px; font-weight: 700; }
  .arr-soon { color: #d93025; }
  .arr-ok { color: #137333; }

  .install-banner { background: #e8f0fe; border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .install-text { font-size: 13px; color: #1a56db; font-weight: 500; }
  .install-btn { background: #1a73e8; color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

  .loading { text-align: center; padding: 60px 0; color: #888; font-size: 15px; }
  .error { background: #fce8e6; border-radius: 12px; padding: 16px; color: #c5221f; font-size: 13px; margin-top: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>🚌 출근 경로</h1>
  <div class="header-right">
    <span class="now-time" id="now-time">--:--</span>
    <button class="refresh-btn" onclick="load()">⟳</button>
  </div>
</div>

<div class="content">
  <div id="install-banner" style="display:none" class="install-banner">
    <span class="install-text">📱 홈 화면에 앱 추가</span>
    <button class="install-btn" id="install-btn">추가</button>
  </div>
  <div id="app"><div class="loading">경로 조회 중...</div></div>
</div>

<script>
let data = null;
let selectedRoute = null;
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});

document.getElementById('install-btn').addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('install-banner').style.display = 'none';
      deferredPrompt = null;
    });
  }
});

function pad(n){ return String(n).padStart(2,'0'); }
function updateClock(){
  const now = new Date();
  document.getElementById('now-time').textContent = pad(now.getHours())+':'+pad(now.getMinutes());
}

async function load() {
  document.getElementById('app').innerHTML = '<div class="loading">실시간 조회 중...</div>';
  try {
    const res = await fetch('/api/dashboard');
    data = await res.json();
    if (data.error) throw new Error(data.error);
    selectedRoute = data.recommended;
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error">⚠ 오류: ${e.message}</div>`;
  }
}

function selectRoute(id) {
  selectedRoute = id;
  render();
}

function stepHtml(step) {
  if (step.type === 'bus') return `<span class="step step-bus">🚌 ${step.name}번</span>`;
  if (step.type === 'subway') return `<span class="step step-subway">🚇 ${step.name}</span>`;
  if (step.type === 'walk') return `<span class="step step-walk">🚶 ${step.time}분</span>`;
  return '';
}

function render() {
  const routes = data.routes;
  const sel = routes.find(r => r.id === selectedRoute) || routes[0];

  const badgeHtml = sel.onTime
    ? sel.marginMin >= 10
      ? `<span class="badge badge-ok">여유 ${sel.marginMin}분</span>`
      : `<span class="badge badge-warn">여유 ${sel.marginMin}분</span>`
    : `<span class="badge badge-danger">⚠ ${Math.abs(sel.marginMin)}분 지연</span>`;

  const routeCards = routes.map(r => `
    <div class="route-card ${r.id === selectedRoute ? 'selected' : ''}" onclick="selectRoute('${r.id}')">
      <div class="route-header">
        <span class="route-label">경로 ${r.id}${r.id === data.recommended ? '<span class="rec-badge">추천</span>' : ''}</span>
        <span class="route-meta">${r.totalTime}분 · 환승 ${r.transferCount}회</span>
      </div>
      <div class="steps">${r.steps.map(stepHtml).join('')}</div>
    </div>`).join('');

  const busSteps = sel.timeline.filter(t => t.type === 'bus');
  const busRows = busSteps.map(b => `
    <div class="bus-row">
      <span class="bus-name">${b.label} (${b.station})</span>
      <span class="bus-arr ${b.waitMin <= 3 ? 'arr-soon' : 'arr-ok'}">${b.waitMin === 0 ? '곧 도착' : b.waitMin + '분 후'}</span>
    </div>`).join('') || '<div class="bus-row"><span class="bus-name" style="color:#888">버스 정보 없음</span></div>';

  const tlHtml = sel.timeline.map((t, i) => {
    const isLast = i === sel.timeline.length - 1;
    const dot = isLast ? 'tl-dot-dest' : `tl-dot-${t.type}`;
    const sub = t.type !== 'walk' ? `${t.station || ''} → ${t.endStation || ''}${t.waitMin > 0 ? ` · ${t.waitMin}분 대기` : ''}` : '';
    return `<div class="tl">
      <div class="tl-dot ${dot}"></div>
      <div class="tl-line"></div>
      <div class="tl-body">
        <div class="tl-main">${t.label}</div>
        ${sub ? `<div class="tl-sub">${sub}</div>` : ''}
      </div>
      <div class="tl-time">${t.depart}</div>
    </div>`;
  }).join('') + `
    <div class="tl">
      <div class="tl-dot tl-dot-dest"></div>
      <div class="tl-body"><div class="tl-main">퍼블릭가산 A동 도착</div></div>
      <div class="tl-time">${sel.arriveTime}</div>
    </div>`;

  document.getElementById('app').innerHTML = `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">권장 출발</div>
        <div class="metric-val">${sel.recommendDepart}</div>
        <div class="metric-sub" style="color:#888">10시 도착 기준</div>
      </div>
      <div class="metric">
        <div class="metric-label">도착 예상</div>
        <div class="metric-val">${sel.arriveTime}</div>
        <div class="metric-sub">${badgeHtml}</div>
      </div>
    </div>

    <div class="section-title">경로 선택</div>
    ${routeCards}

    <div class="section-title">실시간 버스 도착</div>
    <div class="bus-card">${busRows}</div>

    <div class="section-title">상세 경로</div>
    <div class="timeline-card">${tlHtml}</div>`;
}

updateClock();
setInterval(updateClock, 10000);
load();
setInterval(load, 60000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
